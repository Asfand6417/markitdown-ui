                    border-radius: 8px;
                    border-left: 4px solid #667eea;
                }
                .feature h3 { color: #667eea; margin-bottom: 10px; }
                code {
                    background: #f6f8fa;
                    padding: 2px 6px;
                    border-radius: 3px;
                    font-family: 'Monaco', 'Courier New', monospace;
                }
                pre {
                    background: #2d2d2d;
                    color: #f8f8f2;
                    padding: 15px;
                    border-radius: 8px;
                    overflow-x: auto;
                    margin: 15px 0;
                }
                table { width: 100%; border-collapse: collapse; margin: 15px 0; }
                th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background: #f6f8fa; font-weight: 600; }
            </style>
        </head>
        <body>
            <div class="container">
                <header>
                    <h1>📄 MarkItDown Converter UI</h1>
                    <p>A simple, user-friendly web interface for converting documents to Markdown</p>
                    <div class="button-group">
                        <a href="https://github.com/Asfand6417/markitdown-ui" class="btn-primary">📖 View on GitHub</a>
                        <a href="#quick-start" class="btn-secondary">🚀 Quick Start</a>
                    </div>
                </header>

                <div class="content" id="readme-content">
                    <h2>✨ Features</h2>
                    <div class="features">
                        <div class="feature">
                            <h3>🎯 Simple Upload</h3>
                            <p>Drag and drop or click to upload files</p>
                        </div>
                        <div class="feature">
                            <h3>📄 Multiple Formats</h3>
                            <p>PDF, DOCX, PPTX, XLSX, HTML, Images, TXT</p>
                        </div>
                        <div class="feature">
                            <h3>⚡ Fast Conversion</h3>
                            <p>Real-time conversion feedback</p>
                        </div>
                        <div class="feature">
                            <h3>💾 One-Click Download</h3>
                            <p>Instant markdown file download</p>
                        </div>
                        <div class="feature">
                            <h3>🎨 Beautiful UI</h3>
                            <p>Modern, responsive design</p>
                        </div>
                        <div class="feature">
                            <h3>🔒 Privacy</h3>
                            <p>Local file processing, not stored</p>
                        </div>
                    </div>

                    <h2 id="quick-start">🚀 Quick Start</h2>
                    <h3>Local Development</h3>
                    <pre><code># Clone repository
git clone https://github.com/Asfand6417/markitdown-ui.git
cd markitdown-ui

# Create virtual environment
python3 -m venv .venv
source .venv/bin/activate

# Install dependencies
pip install -r requirements.txt

# Run app
python app.py

# Open browser to http://localhost:5000</code></pre>

                    <h2>📦 Installation Options</h2>
                    <pre><code># All features (recommended)
pip install "markitdown[all]"

# PDF support only
pip install "markitdown[pdf]"

# Specific features
pip install "markitdown[pdf,docx,image]"</code></pre>

                    <h2>🐳 Docker Deployment</h2>
                    <pre><code># Build image
docker build -t markitdown-ui .

# Run container
docker run -p 5000:5000 markitdown-ui</code></pre>

                    <h2>🔗 Resources</h2>
                    <ul>
                        <li><a href="https://github.com/microsoft/markitdown">Microsoft MarkItDown GitHub</a></li>
                        <li><a href="https://github.com/Asfand6417/markitdown-ui">Project Repository</a></li>
                        <li><a href="https://flask.palletsprojects.com/">Flask Documentation</a></li>
                    </ul>

                    <h2>📄 License</h2>
                    <p>MIT License - See LICENSE file for details</p>

