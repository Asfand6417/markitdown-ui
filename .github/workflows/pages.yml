                    border: none;
                    cursor: pointer;
                    font-size: 1em;
                    transition: all 0.3s;
                }
                .btn-primary {
                    background: white;
                    color: #667eea;
                }
                .btn-primary:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                }
                .btn-secondary {
                    background: rgba(255,255,255,0.2);
                    color: white;
                    border: 2px solid white;
                }
                .btn-secondary:hover {
                    background: rgba(255,255,255,0.3);
                }
                .content {
                    background: white;
