                    <p><strong>Credits:</strong> This project uses <a href="https://github.com/microsoft/markitdown">Microsoft's MarkItDown</a> library.</p>
                </div>
            </div>
        </body>
        </html>
        EOF
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
